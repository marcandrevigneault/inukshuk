name: E2E (Maestro · Android)

# End-to-end smoke test on a real Android emulator. Builds a release APK, boots
# an emulator with hardware acceleration, installs the app, and runs the Maestro
# flow in .maestro/. Nightly + on demand to conserve CI minutes.
#
# The APK must be a RELEASE build: debug builds don't embed a JS bundle, and the
# app ships expo-dev-client, so a debug APK in CI (no Metro) boots into the
# dev-launcher "connect to a development server" screen — no assertion on real
# UI can ever pass. The prebuild template signs release with the debug keystore,
# so no signing secrets are needed.
on:
  workflow_dispatch:
  schedule:
    - cron: '15 5 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v4

      - run: npm ci

      # x86_64 only: the emulator is x86_64, and a single-ABI APK cuts both the
      # native build and the ~6-minute multi-ABI adb install.
      - name: Prebuild + assemble release APK
        run: |
          npx expo prebuild --platform android --no-install
          cd android && ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=x86_64
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro flow on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # The Maestro Android driver installs an instrumentation APK and connects
          # over a dadb port; on a cold CI emulator that handshake routinely exceeds
          # Maestro's default startup window and throws AndroidDriverTimeoutException
          # before any flow runs. Give it room.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 240000
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # Headless, software GPU, no snapshots/boot-anim — the stable combo for
          # ubuntu-latest CI emulators (avoids GPU/snapshot races at boot).
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: |
            # Wait until the system is fully booted before letting Maestro attach,
            # otherwise the driver races package-manager readiness.
            adb wait-for-device
            adb shell 'while [ "$(getprop sys.boot_completed)" != "1" ]; do sleep 1; done'
            # Kill animations so Maestro's element waits don't flake on transitions.
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            maestro test .maestro/smoke.yaml

      # Maestro writes screenshots + the UI hierarchy on failure; without this
      # upload every red run is a black box.
      - name: Upload Maestro debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-debug
          path: ~/.maestro/tests
          retention-days: 7
