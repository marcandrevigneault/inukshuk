# Maestro smoke flow: launches the app and walks the three tabs, asserting the
# key UI of each is present. Fast end-to-end confidence that navigation, the map
# screen, and the providers all mount without crashing.
appId: com.inukshuk.app
---
- launchApp:
    permissions:
      location: allow
# The map screen's record entry point is now a "+" speed-dial (not a "Record"
# button), so assert the Map tab itself is mounted instead.
- assertVisible: 'Map'
- tapOn: 'Library'
- assertVisible: 'Import map'
- tapOn: 'Settings'
- assertVisible: 'Keep screen awake'
- tapOn: 'Map'
- assertVisible: 'Map'
