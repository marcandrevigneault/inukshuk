name: Native Build Test

# Proves the app actually compiles into real iOS and Android binaries on the
# latest toolchains. No code signing, no store accounts needed — pure compile
# verification. Runs on PRs that touch native-affecting files, and nightly.
on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'app.config.ts'
      - 'app.json'
      - 'src/**'
      - 'app/**'
      - 'assets/**'
      - '.github/workflows/native-build.yml'
  workflow_dispatch:
  schedule:
    # 04:30 UTC daily — catches breakage from new Xcode / Android SDK images.
    - cron: '30 4 * * *'

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (Gradle assembleDebug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The RN + reanimated/worklets NDK build exhausts the runner's small disk
      # ("No space left on device"). Reclaim the large preinstalled toolchains we
      # don't use (dotnet ~25GB, GHC, boost, swift) before building.
      - name: Free up runner disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/share/swift
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Compile debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  ios:
    name: iOS (xcodebuild simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # A Swift Package dependency requires Swift tools 6.2; the image's default
      # Xcode 16.4 ships Swift 6.1, so package resolution fails ("Could not
      # resolve package dependencies"). Select the newest stable Xcode (Swift 6.2+).
      - name: Select newest Xcode (Swift 6.2+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Prebuild native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: npx pod-install

      - name: Compile for simulator (no signing)
        run: |
          xcodebuild \
            -workspace ios/Inukshuk.xcworkspace \
            -scheme Inukshuk \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
