version: 2
updates:
  # Keep npm dependencies fresh. Grouped so related bumps land in one PR and CI
  # gates them; the dependabot-automerge workflow merges green minor/patch PRs.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      expo:
        patterns:
          - 'expo'
          - 'expo-*'
          - '@expo/*'
          - 'react-native'
          - 'react-native-*'
          - '@react-native/*'
      dev-tooling:
        patterns:
          - 'eslint*'
          - 'prettier*'
          - 'jest*'
          - '@testing-library/*'
          - 'typescript'
          - '@types/*'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
