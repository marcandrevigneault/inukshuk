version: 2
updates:
  # Keep npm dependencies fresh. Grouped so related bumps land in one PR and CI
  # gates them; the dependabot-automerge workflow merges green minor/patch PRs.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # React's version is dictated by the installed Expo SDK / React Native
      # renderer. Bumping it independently crashes the app at launch with an
      # "Incompatible React versions" error (see #8). These move only via
      # `expo install` during an SDK upgrade, never on their own.
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: 'react-test-renderer'
      # three must stay on r162. expo-gl provides a WebGL 1 context, and three
      # r163+ dropped WebGL 1 support, so the 3D terrain view (expo-three
      # Renderer over GLView) breaks on newer three. See #39 (the pin) and #62
      # (the auto-merged 0.184 bump that silently reverted it). Allow 0.162.x
      # patches only; block anything that crosses r163.
      - dependency-name: 'three'
        versions: ['>=0.163.0']
    groups:
      expo:
        patterns:
          - 'expo'
          - 'expo-*'
          - '@expo/*'
          - 'react-native'
          - 'react-native-*'
          - '@react-native/*'
      dev-tooling:
        patterns:
          - 'eslint*'
          - 'prettier*'
          - 'jest*'
          - '@testing-library/*'
          - 'typescript'
          - '@types/*'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
